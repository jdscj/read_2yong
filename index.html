<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>이룡 독서 한마당</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f7f2;min-height:100vh}
.app{padding:16px;max-width:680px;margin:0 auto}
.header{text-align:center;padding:24px 0 18px;border-bottom:1px solid #e8e4d8;margin-bottom:20px}
.header .sub{font-size:13px;color:#888;letter-spacing:0.5px;margin-bottom:6px}
.header h1{font-size:22px;font-weight:600;color:#2c2c2a}
.loading-bar{text-align:center;padding:40px;font-size:14px;color:#888}
.students-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.student-card{background:#fff;border:1px solid #e8e4d8;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s}
.student-card:hover{border-color:#c8b96a;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.crop-icon{font-size:32px;margin-bottom:6px}
.student-name{font-size:13px;font-weight:600;color:#2c2c2a;margin-bottom:5px}
.coin-badge{display:inline-block;background:#faeeda;color:#854f0b;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.teacher-btn{display:block;margin:0 auto;padding:8px 22px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#666;cursor:pointer;transition:background 0.15s}
.teacher-btn:hover{background:#f0ede4}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;border:1px solid #e8e4d8;padding:24px;width:360px;max-width:92vw;max-height:90vh;overflow-y:auto}
.modal.wide{width:520px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mhead h2{font-size:17px;font-weight:600;color:#2c2c2a}
.mclose{background:none;border:none;font-size:20px;cursor:pointer;color:#999;line-height:1;padding:0}
.mclose:hover{color:#444}
.pw-input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;background:#f8f7f2;color:#2c2c2a;outline:none}
.pw-input:focus{border-color:#c8b96a}
.pw-err{font-size:12px;color:#a32d2d;margin-bottom:8px;min-height:16px}
.hist-item{padding:9px 0;border-bottom:1px solid #f0ede4}
.hist-item:last-child{border-bottom:none}
.hist-row{display:flex;justify-content:space-between;align-items:center}
.hist-label{font-size:13px;color:#2c2c2a}
.hist-date{font-size:11px;color:#aaa;margin-top:2px}
.earn{color:#2d6a11;font-size:13px;font-weight:600}
.spend{color:#a32d2d;font-size:13px;font-weight:600}
.bonus-tag{display:inline-block;background:#e6f1fb;color:#185fa5;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.empty{font-size:13px;color:#aaa;text-align:center;padding:24px 0}
.step-lbl{font-size:12px;color:#888;margin-bottom:7px}
.row-btns{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:15px}
.sbtn{padding:7px 13px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#2c2c2a;transition:background 0.12s}
.sbtn:hover{background:#f0ede4}
.act-list{display:flex;flex-direction:column;gap:7px;margin-bottom:15px}
.abtn{padding:9px 13px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#2c2c2a;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:background 0.12s}
.abtn:hover{background:#f0ede4}
.abtn.done-mark::after{content:"완료";font-size:10px;color:#3b6d11;margin-left:5px}
.coin-opts{display:flex;gap:7px;margin-bottom:15px;flex-wrap:wrap}
.copt{padding:7px 15px;font-size:13px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;color:#2c2c2a;transition:background 0.12s}
.copt:hover{background:#f0ede4}
.copt.active{background:#faeeda;border-color:#e9a825;color:#633806}
.copt.danger-opt.active{background:#fcebeb;border-color:#e24b4a;color:#791f1f}
.main-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background 0.15s}
.main-btn.green{background:#1d9e75}.main-btn.green:hover{background:#0f6e56}
.main-btn.red{background:#e24b4a}.main-btn.red:hover{background:#a32d2d}
.main-btn:disabled{background:#e8e4d8;color:#aaa;cursor:not-allowed}
.back-btn{width:100%;margin-top:9px;padding:9px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#666;transition:background 0.12s}
.back-btn:hover{background:#f0ede4}
.success-wrap{text-align:center;padding:14px 0}
.success-wrap .big{font-size:40px}
.success-wrap p{font-size:15px;color:#2c2c2a;margin-top:10px}
.success-wrap .bonus{font-size:13px;color:#185fa5;margin-top:7px}
.teacher-tabs{display:flex;margin-bottom:18px;border:1px solid #ddd;border-radius:10px;overflow:hidden}
.ttab{flex:1;padding:9px;font-size:13px;border:none;background:#fff;cursor:pointer;color:#888;transition:background 0.12s}
.ttab.active{background:#faeeda;color:#633806;font-weight:600}
.all-table{width:100%;border-collapse:collapse;font-size:13px}
.all-table th{text-align:left;padding:7px 9px;border-bottom:1px solid #ddd;color:#888;font-weight:500}
.all-table td{padding:7px 9px;border-bottom:1px solid #f0ede4}
.all-hist-item{padding:8px 0;border-bottom:1px solid #f0ede4}
.all-hist-item:last-child{border-bottom:none}
.hist-scroll{max-height:300px;overflow-y:auto}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#1d9e75;margin-right:5px;vertical-align:middle}
.sync-dot.off{background:#e24b4a}
@media(max-width:480px){
  .students-grid{grid-template-columns:repeat(3,1fr)}
  .modal.wide{width:96vw}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="sub">&lt;생태 독서동아리&gt;</div>
    <h1>이룡 독서 한마당</h1>
    <div style="font-size:11px;color:#aaa;margin-top:6px">
      <span class="sync-dot off" id="syncDot"></span><span id="syncText">연결 중...</span>
    </div>
  </div>
  <div id="mainContent">
    <div class="loading-bar">🌱 데이터 불러오는 중...</div>
  </div>
  <button class="teacher-btn" onclick="openPw()" style="margin-top:4px">🔒 교사 모드</button>
</div>

<div class="overlay" id="histModal">
  <div class="modal">
    <div class="mhead">
      <h2 id="histTitle"></h2>
      <button class="mclose" onclick="close1('histModal')">✕</button>
    </div>
    <div id="histSummary" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
    <div class="hist-scroll" id="histList"></div>
  </div>
</div>

<div class="overlay" id="pwModal">
  <div class="modal">
    <div class="mhead"><h2>🔒 교사 모드</h2><button class="mclose" onclick="close1('pwModal')">✕</button></div>
    <input class="pw-input" id="pwInput" type="password" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')chkPw()"/>
    <div class="pw-err" id="pwErr"></div>
    <button class="main-btn green" onclick="chkPw()">입력</button>
  </div>
</div>

<div class="overlay" id="teacherModal">
  <div class="modal wide">
    <div class="mhead"><h2>교사 모드</h2><button class="mclose" onclick="close1('teacherModal')">✕</button></div>
    <div class="teacher-tabs">
      <button class="ttab active" id="tab1" onclick="switchTab(1)">코인 지급</button>
      <button class="ttab" id="tab2" onclick="switchTab(2)">코인 차감</button>
      <button class="ttab" id="tab3" onclick="switchTab(3)">전체 현황</button>
    </div>
    <div id="teacherContent"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3YRUA_NFfUPkmmMXKCkQNZ2c36Gsn04o",
  authDomain: "irong-reading-80040.firebaseapp.com",
  databaseURL: "https://irong-reading-80040-default-rtdb.firebaseio.com",
  projectId: "irong-reading-80040",
  storageBucket: "irong-reading-80040.firebasestorage.app",
  messagingSenderId: "103564785464",
  appId: "1:103564785464:web:f49906783778c2e2b9b3cd"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const PW = "1234321";
const students = [
  {id:0,name:"박희락",crop:"🌽"},
  {id:1,name:"허준우",crop:"🥬"},
  {id:2,name:"박온유",crop:"🌻"},
  {id:3,name:"박화평",crop:"🥕"},
  {id:4,name:"김시후",crop:"🍓"},
];
const activities = [
  {id:"보물찾기",    label:"보물찾기",      coins:[1]},
  {id:"환경아고마워", label:"환경아 고마워",  coins:[2,3,4]},
  {id:"이장면이좋아", label:"이 장면이 좋아", coins:[1,2,3]},
  {id:"책제목센스",  label:"책 제목 센스",   coins:[1]},
  {id:"N행시짓기",   label:"N행시 짓기",    coins:[1]},
];
const ALL_IDS = activities.map(a=>a.id);

let D = {
  coins:[0,0,0,0,0],
  history:[[],[],[],[],[]],
  completed:[[],[],[],[],[]],
  bonusGiven:[false,false,false,false,false]
};

async function save(){
  await set(ref(db,"app"), D);
}

onValue(ref(db,"app"), (snap)=>{
  const val = snap.val();
  if(val){
    D = val;
    D.history   = D.history   || [[],[],[],[],[]];
    D.completed = D.completed || [[],[],[],[],[]];
    D.bonusGiven= D.bonusGiven|| [false,false,false,false,false];
    for(let i=0;i<5;i++){
      D.history[i]   = D.history[i]   || [];
      D.completed[i] = D.completed[i] || [];
    }
  }
  document.getElementById("syncDot").className="sync-dot";
  document.getElementById("syncText").textContent="실시간 동기화 중";
  renderStudents();
}, ()=>{
  document.getElementById("syncDot").className="sync-dot off";
  document.getElementById("syncText").textContent="연결 오류";
});

function renderStudents(){
  const wrap = document.getElementById("mainContent");
  wrap.innerHTML = '<div class="students-grid" id="studentsGrid"></div>';
  const g = document.getElementById("studentsGrid");
  students.forEach((s,i)=>{
    const d = document.createElement("div");
    d.className="student-card";
    d.innerHTML=`<div class="crop-icon">${s.crop}</div>
      <div class="student-name">${s.name}</div>
      <div class="coin-badge">${D.coins[i]} 코인</div>`;
    d.onclick=()=>openHist(i);
    g.appendChild(d);
  });
}

function openHist(i){
  const s=students[i];
  document.getElementById("histTitle").innerHTML=`${s.crop} ${s.name}의 기록`;
  const h=D.history[i]||[];
  const earned=h.filter(r=>r.amount>0).reduce((a,r)=>a+r.amount,0);
  const spent=h.filter(r=>r.amount<0).reduce((a,r)=>a+r.amount,0);
  document.getElementById("histSummary").innerHTML=`
    <span style="background:#e1f5ee;color:#085041;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600">획득 +${earned}</span>
    <span style="background:#fcebeb;color:#791f1f;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600">사용 ${spent}</span>
    <span style="background:#faeeda;color:#633806;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600">보유 ${D.coins[i]}</span>`;
  document.getElementById("histList").innerHTML = h.length
    ? h.slice().reverse().map(r=>`<div class="hist-item">
        <div class="hist-row">
          <span class="hist-label">${r.label}${r.bonus?'<span class="bonus-tag">보너스</span>':''}</span>
          <span class="${r.amount>0?'earn':'spend'}">${r.amount>0?'+':''}${r.amount} 코인</span>
        </div>
        <div class="hist-date">${r.date}</div>
      </div>`).join("")
    : `<div class="empty">아직 기록이 없어요</div>`;
  document.getElementById("histModal").classList.add("open");
}

window.openPw=function(){
  document.getElementById("pwInput").value="";
  document.getElementById("pwErr").textContent="";
  document.getElementById("pwModal").classList.add("open");
  setTimeout(()=>document.getElementById("pwInput").focus(),100);
};
window.chkPw=function(){
  if(document.getElementById("pwInput").value===PW){
    close1("pwModal");
    ts={step:1,student:null,activity:null,coin:null,bonusTriggered:false};
    document.getElementById("teacherModal").classList.add("open");
    switchTab(1);
  } else {
    document.getElementById("pwErr").textContent="비밀번호가 올바르지 않습니다";
  }
};
window.close1=function(id){ document.getElementById(id).classList.remove("open"); };
document.querySelectorAll(".overlay").forEach(el=>{
  el.addEventListener("click",e=>{ if(e.target===el) el.classList.remove("open"); });
});

window.switchTab=function(n){
  [1,2,3].forEach(i=>document.getElementById("tab"+i).className="ttab"+(i===n?" active":""));
  if(n===1){ ts={step:1,student:null,activity:null,coin:null,bonusTriggered:false}; renderGive(); }
  else if(n===2){ td={step:1,student:null,coin:null}; renderDeduct(); }
  else renderAll();
};

let ts={step:1,student:null,activity:null,coin:null,bonusTriggered:false};
function renderGive(){
  const c=document.getElementById("teacherContent");
  if(ts.step===1){
    c.innerHTML=`<div class="step-lbl">1단계 — 학생 선택</div>
      <div class="row-btns">${students.map((s,i)=>`
        <button class="sbtn" onclick="window.G.gs(${i})">${s.crop} ${s.name}</button>`).join("")}</div>`;
  } else if(ts.step===2){
    const s=students[ts.student];
    c.innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:11px">${s.crop} ${s.name}</div>
      <div class="step-lbl">2단계 — 활동 선택</div>
      <div class="act-list">${activities.map(a=>{
        const done=(D.completed[ts.student]||[]).includes(a.id);
        return `<button class="abtn${done?" done-mark":""}" onclick="window.G.ga('${a.id}')">
          <span>${a.label}</span>
          <span style="font-size:12px;color:#aaa">${a.coins.length===1?a.coins[0]:a.coins[0]+"~"+a.coins[a.coins.length-1]} 코인</span>
        </button>`;
      }).join("")}</div>
      <button class="back-btn" onclick="ts.step=1;renderGive()">이전</button>`;
  } else if(ts.step===3){
    const act=activities.find(a=>a.id===ts.activity);
    const s=students[ts.student];
    c.innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:11px">${s.crop} ${s.name} · ${act.label}</div>
      <div class="step-lbl">3단계 — 코인 선택</div>
      <div class="coin-opts">${act.coins.map(cv=>`
        <button class="copt${ts.coin===cv?" active":""}" onclick="window.G.sc(${cv})">${cv}코인</button>`).join("")}</div>
      <button class="main-btn green" onclick="window.G.doGive()" ${ts.coin===null?"disabled":""}>🎁 선물하기</button>
      <button class="back-btn" onclick="ts.step=2;renderGive()">이전</button>`;
  } else {
    c.innerHTML=`<div class="success-wrap">
      <div class="big">🎉</div>
      <p>${students[ts.student].name}에게 ${ts.coin}코인 지급!</p>
      ${ts.bonusTriggered?'<p class="bonus">✨ 모든 활동 완료! 보너스 5코인도 지급됐어요</p>':""}
      <button class="main-btn green" style="margin-top:18px" onclick="ts={step:1,student:null,activity:null,coin:null,bonusTriggered:false};renderGive()">계속 지급</button>
    </div>`;
  }
}

let td={step:1,student:null,coin:null};
function renderDeduct(){
  const c=document.getElementById("teacherContent");
  if(td.step===1){
    c.innerHTML=`<div class="step-lbl">1단계 — 학생 선택</div>
      <div class="row-btns">${students.map((s,i)=>`
        <button class="sbtn" onclick="window.G.ds(${i})">${s.crop} ${s.name}
          <span style="font-size:11px;color:#aaa;margin-left:3px">${D.coins[i]}코인</span>
        </button>`).join("")}</div>`;
  } else if(td.step===2){
    const s=students[td.student];
    const max=D.coins[td.student];
    const opts=max>0?Array.from({length:Math.min(max,10)},(_,k)=>k+1):[];
    c.innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:11px">${s.crop} ${s.name} (현재 ${max}코인)</div>
      <div class="step-lbl">2단계 — 차감 코인 선택</div>
      ${opts.length
        ?`<div class="coin-opts">${opts.map(cv=>`
            <button class="copt danger-opt${td.coin===cv?" active":""}" onclick="window.G.dc(${cv})">${cv}코인</button>`).join("")}</div>
           <button class="main-btn red" onclick="window.G.doDeduct()" ${td.coin===null?"disabled":""}>차감하기</button>`
        :`<p style="font-size:13px;color:#aaa;margin-bottom:14px">차감할 코인이 없습니다</p>`}
      <button class="back-btn" onclick="td.step=1;renderDeduct()">이전</button>`;
  } else {
    c.innerHTML=`<div class="success-wrap">
      <div class="big">✅</div>
      <p>${students[td.student].name}에게서 ${td.coin}코인 차감!</p>
      <button class="main-btn red" style="margin-top:18px" onclick="td={step:1,student:null,coin:null};renderDeduct()">계속 차감</button>
    </div>`;
  }
}

function renderAll(){
  const c=document.getElementById("teacherContent");
  const allHist=[];
  students.forEach((s,i)=>{
    (D.history[i]||[]).forEach(h=>allHist.push({...h,sName:s.name,sCrop:s.crop}));
  });
  allHist.sort((a,b)=>b.date.localeCompare(a.date));
  c.innerHTML=`
    <table class="all-table" style="margin-bottom:18px">
      <tr><th>학생</th><th>보유</th><th>획득</th><th>사용</th><th>활동</th><th>보너스</th></tr>
      ${students.map((s,i)=>{
        const earned=(D.history[i]||[]).filter(h=>h.amount>0).reduce((a,h)=>a+h.amount,0);
        const spent=Math.abs((D.history[i]||[]).filter(h=>h.amount<0).reduce((a,h)=>a+h.amount,0));
        return `<tr>
          <td>${s.crop} ${s.name}</td>
          <td><span class="coin-badge">${D.coins[i]}</span></td>
          <td style="color:#2d6a11;font-weight:600">+${earned}</td>
          <td style="color:#a32d2d;font-weight:600">${spent>0?'-'+spent:'—'}</td>
          <td>${(D.completed[i]||[]).length}/5</td>
          <td>${D.bonusGiven[i]?"✅":"—"}</td>
        </tr>`;
      }).join("")}
    </table>
    <div style="border-top:1px solid #e8e4d8;padding-top:13px;margin-bottom:10px">
      <div class="step-lbl">전체 활동 기록 (최근순)</div>
    </div>
    <div class="hist-scroll">
      ${allHist.length
        ?allHist.map(h=>`<div class="all-hist-item">
          <div class="hist-row">
            <span class="hist-label">${h.sCrop} ${h.sName} — ${h.label}${h.bonus?'<span class="bonus-tag">보너스</span>':''}</span>
            <span class="${h.amount>0?'earn':'spend'}">${h.amount>0?'+':''}${h.amount}</span>
          </div>
          <div class="hist-date">${h.date}</div>
        </div>`).join("")
        :`<div class="empty">기록이 없습니다</div>`}
    </div>`;
}

window.G={
  gs(i){ ts.student=i; ts.step=2; renderGive(); },
  ga(id){ ts.activity=id; ts.coin=null; ts.step=3; renderGive(); },
  sc(cv){ ts.coin=cv; renderGive(); },
  async doGive(){
    const i=ts.student;
    const act=activities.find(a=>a.id===ts.activity);
    const now=new Date();
    const ds=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    D.coins[i]+=ts.coin;
    D.history[i].push({label:act.label,amount:ts.coin,date:ds,bonus:false});
    if(!D.completed[i].includes(act.id)) D.completed[i].push(act.id);
    ts.bonusTriggered=false;
    if(!D.bonusGiven[i]&&ALL_IDS.every(id=>D.completed[i].includes(id))){
      D.bonusGiven[i]=true; D.coins[i]+=5;
      D.history[i].push({label:"모든 활동 완료 보너스",amount:5,date:ds,bonus:true});
      ts.bonusTriggered=true;
    }
    await save(); ts.step=4; renderGive();
  },
  ds(i){ td.student=i; td.coin=null; td.step=2; renderDeduct(); },
  dc(cv){ td.coin=cv; renderDeduct(); },
  async doDeduct(){
    const i=td.student;
    const now=new Date();
    const ds=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    D.coins[i]-=td.coin;
    D.history[i].push({label:"코인 사용",amount:-td.coin,date:ds,bonus:false});
    await save(); td.step=3; renderDeduct();
  }
};

window.ts=ts; window.td=td;
window.renderGive=renderGive; window.renderDeduct=renderDeduct;
</script>
</body>
</html>
